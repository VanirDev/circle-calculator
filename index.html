<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SE Circle Calculator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      color: #cdd6f4;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 16px;
      color: #e2e8f0;
    }

    #controls {
      background: #16213e;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="number"] {
      background: #0f3460;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 1rem;
      padding: 6px 10px;
      width: 80px;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #e94560;
    }

    .toggle-group {
      display: flex;
      gap: 6px;
    }

    .toggle-btn {
      background: #0f3460;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #aaa;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 6px 14px;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      accent-color: #e94560;
      cursor: pointer;
      width: 15px;
      height: 15px;
    }

    .checkbox-label input[type="checkbox"]:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    #grid-canvas {
      border: 1px solid #334155;
      border-radius: 4px;
      cursor: crosshair;
      display: block;
      background: #0d1117;
    }

    #legend {
      background: #16213e;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    #tooltip {
      position: fixed;
      background: #16213e;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 0.8rem;
      padding: 6px 10px;
      pointer-events: none;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <h1>SE Circle Calculator</h1>

  <div id="controls">
    <div class="control-group">
      <label for="width-input">Width</label>
      <input id="width-input" type="number" min="3" max="200" value="20"
             oninput="state.width = Math.max(3, Math.min(200, +this.value)); recalculate();" />
    </div>

    <div class="control-group">
      <label for="height-input">Height</label>
      <input id="height-input" type="number" min="3" max="200" value="20"
             oninput="state.height = Math.max(3, Math.min(200, +this.value)); recalculate();" />
    </div>

    <div class="control-group">
      <label>Mode</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-internal" onclick="setMode('internal')">Internal</button>
        <button class="toggle-btn active" id="btn-external" onclick="setMode('external')">External</button>
      </div>
    </div>

    <div class="control-group">
      <label>Block Types</label>
      <div class="checkbox-group" id="block-checkboxes">
        <label class="checkbox-label">
          <input type="checkbox" value="flat" checked disabled />
          Flat
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope45" checked
                 onchange="toggleBlock('slope45', this.checked)" />
          45°
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope2" checked
                 onchange="toggleBlock('slope2', this.checked)" />
          1:2
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope3"
                 onchange="toggleBlock('slope3', this.checked)" />
          1:3
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope4"
                 onchange="toggleBlock('slope4', this.checked)" />
          1:4
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope5"
                 onchange="toggleBlock('slope5', this.checked)" />
          1:5
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope6"
                 onchange="toggleBlock('slope6', this.checked)" />
          1:6
        </label>
      </div>
    </div>
  </div>

  <canvas id="grid-canvas"></canvas>
  <div id="legend"></div>
  <div id="tooltip"></div>

  <script>
    const BLOCK_TYPES = {
      flat:    { name: 'Flat',  dx: 1, dy: 0, angle: 0,                    color: '#4a9eff' },
      slope45: { name: '45°',   dx: 1, dy: 1, angle: Math.PI / 4,          color: '#e94560' },
      slope2:  { name: '1:2',   dx: 1, dy: 2, angle: Math.atan2(1, 2),     color: '#f5a623' },
      slope3:  { name: '1:3',   dx: 1, dy: 3, angle: Math.atan2(1, 3),     color: '#7ed321' },
      slope4:  { name: '1:4',   dx: 1, dy: 4, angle: Math.atan2(1, 4),     color: '#bd10e0' },
      slope5:  { name: '1:5',   dx: 1, dy: 5, angle: Math.atan2(1, 5),     color: '#50e3c2' },
      slope6:  { name: '1:6',   dx: 1, dy: 6, angle: Math.atan2(1, 6),     color: '#ff6b6b' },
    };

    const state = {
      width: 20,
      height: 20,
      mode: 'external',
      enabledBlocks: new Set(['flat', 'slope45', 'slope2']),
      grid: [],
      hoverCell: null,
    };

    function setMode(mode) {
      state.mode = mode;
      document.getElementById('btn-internal').classList.toggle('active', mode === 'internal');
      document.getElementById('btn-external').classList.toggle('active', mode === 'external');
      recalculate();
    }

    function toggleBlock(key, enabled) {
      if (enabled) {
        state.enabledBlocks.add(key);
      } else {
        state.enabledBlocks.delete(key);
      }
      recalculate();
    }

    function getEnabledBlocks() {
      return Object.entries(BLOCK_TYPES)
        .filter(([key]) => state.enabledBlocks.has(key))
        .map(([key, block]) => ({ key, ...block }));
    }

    function recalculate() {
      computeCircle();
      render();
    }

    function computeCircle() {
      const w = state.width;
      const h = state.height;

      // Initialize grid[y][x] = null
      const grid = [];
      for (let y = 0; y < h; y++) {
        grid[y] = new Array(w).fill(null);
      }

      // Radii: for external mode, blocks sit outside the ellipse boundary
      // For internal mode, blocks sit inside
      const cx = w / 2;
      const cy = h / 2;
      const rx = cx; // half-width in grid units
      const ry = cy; // half-height in grid units

      const blocks = getEnabledBlocks();
      const segments = computeQuadrant(rx, ry, blocks);
      placeQuadrant(grid, segments, cx, cy, w, h);

      state.grid = grid;
    }

    function computeQuadrant(rx, ry, blocks) {
      // Walk the arc in quadrant-local coords
      // x goes right from center, y goes down from top
      // We walk from top (x=0, y=0) toward the 45-degree line and beyond to the right
      const segments = [];
      let x = 0;
      let y = 0;

      // We walk until we've covered the quadrant
      // Quadrant spans from top-center to right-center
      // In local coords: x from 0 to floor(rx), y from 0 to floor(ry)
      const maxX = Math.floor(rx);
      const maxY = Math.floor(ry);

      while (x < maxX && y < maxY) {
        // Current position on the ellipse in ellipse-space
        // Map grid position to ellipse parameter
        // ex, ey are the point on the ellipse closest to current grid position
        const ex = x + 0.5;
        const ey = y + 0.5;

        // Tangent angle at this point on the ellipse
        // The gradient of the ellipse x^2/rx^2 + y^2/ry^2 = 1 is (2x/rx^2, 2y/ry^2)
        // The tangent is perpendicular to the gradient
        // Tangent angle from vertical: atan2(ry^2 * ex, rx^2 * ey)
        const tangentAngle = Math.atan2(ry * ry * ex, rx * rx * ey);

        // Find best matching block
        let bestBlock = null;
        let bestDiff = Infinity;
        for (const block of blocks) {
          const diff = Math.abs(tangentAngle - block.angle);
          if (diff < bestDiff) {
            bestDiff = diff;
            bestBlock = block;
          }
        }

        // Determine orientation based on tangent angle
        const vertical = tangentAngle <= Math.PI / 4;

        let dx, dy;
        if (vertical) {
          // Steeper section: advance x by 1, y by block.dy
          dx = 1;
          dy = Math.max(1, bestBlock.dy);
        } else {
          // Shallower section: advance x by block.dy, y by 1
          dx = Math.max(1, bestBlock.dy);
          dy = 1;
        }

        // Don't overshoot the quadrant bounds
        if (x + dx > maxX) dx = maxX - x;
        if (y + dy > maxY) dy = maxY - y;
        if (dx <= 0 || dy <= 0) break;

        segments.push({
          x, y, dx, dy,
          blockKey: bestBlock.key,
          vertical
        });

        x += dx;
        y += dy;
      }

      // Fill remaining gap to reach the edges if needed
      // Fill remaining x with flat blocks (horizontal run)
      while (x < maxX) {
        const remaining = maxX - x;
        segments.push({
          x, y, dx: Math.min(remaining, 1), dy: 1,
          blockKey: 'flat',
          vertical: false
        });
        x += 1;
      }

      // Fill remaining y with flat blocks (vertical run)
      while (y < maxY) {
        segments.push({
          x, y, dx: 1, dy: Math.min(maxY - y, 1),
          blockKey: 'flat',
          vertical: true
        });
        y += 1;
      }

      return segments;
    }

    function getSegmentCells(seg) {
      const cells = [];
      for (let ix = 0; ix < seg.dx; ix++) {
        for (let iy = 0; iy < seg.dy; iy++) {
          cells.push({ x: seg.x + ix, y: seg.y + iy });
        }
      }
      return cells;
    }

    function mirrorPositions(qx, qy, cx, cy, w, h) {
      const results = new Map(); // key -> {gx, gy, rotation}
      const floorCx = Math.floor(cx);
      const ceilCx = Math.ceil(cx);

      // Top-right quadrant (rotation 0)
      const tr = { gx: floorCx + qx, gy: qy, rotation: 0 };
      // Top-left quadrant (rotation 1)
      const tl = { gx: ceilCx - 1 - qx, gy: qy, rotation: 1 };
      // Bottom-right quadrant (rotation 2)
      const br = { gx: floorCx + qx, gy: h - 1 - qy, rotation: 2 };
      // Bottom-left quadrant (rotation 3)
      const bl = { gx: ceilCx - 1 - qx, gy: h - 1 - qy, rotation: 3 };

      const positions = [tr, tl, br, bl];
      for (const pos of positions) {
        if (pos.gx >= 0 && pos.gx < w && pos.gy >= 0 && pos.gy < h) {
          const key = pos.gy * w + pos.gx;
          if (!results.has(key)) {
            results.set(key, pos);
          }
        }
      }

      return Array.from(results.values());
    }

    function placeQuadrant(grid, segments, cx, cy, w, h) {
      for (const seg of segments) {
        const cells = getSegmentCells(seg);
        for (const cell of cells) {
          const mirrors = mirrorPositions(cell.x, cell.y, cx, cy, w, h);
          for (const m of mirrors) {
            if (grid[m.gy] && grid[m.gy][m.gx] === null) {
              grid[m.gy][m.gx] = { type: seg.blockKey, rotation: m.rotation };
            }
          }
        }
      }
    }

    function lightenColor(hex, amount) {
      // Parse hex to r,g,b
      const h = hex.replace('#', '');
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      // Lighten by blending toward white
      const lr = Math.min(255, Math.round(r + (255 - r) * amount));
      const lg = Math.min(255, Math.round(g + (255 - g) * amount));
      const lb = Math.min(255, Math.round(b + (255 - b) * amount));
      return `rgb(${lr}, ${lg}, ${lb})`;
    }

    function render() {
      const canvas = document.getElementById('grid-canvas');
      const ctx = canvas.getContext('2d');
      const w = state.width;
      const h = state.height;

      const cellSize = Math.max(4, Math.min(30, Math.floor(600 / Math.max(w, h))));
      canvas.width = w * cellSize;
      canvas.height = h * cellSize;

      // Background
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw cells
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const cell = state.grid[y] && state.grid[y][x];
          const isHovered = state.hoverCell && state.hoverCell.x === x && state.hoverCell.y === y;
          const px = x * cellSize;
          const py = y * cellSize;
          const cs = cellSize - 1;

          if (cell) {
            const blockType = BLOCK_TYPES[cell.type];
            const baseColor = blockType ? blockType.color : '#666';
            ctx.fillStyle = isHovered ? lightenColor(baseColor, 0.3) : baseColor;
            ctx.fillRect(px, py, cs, cs);

            // Draw slope indicator for non-flat blocks
            if (cell.type !== 'flat' && cellSize >= 6) {
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
              ctx.lineWidth = 1;
              ctx.beginPath();
              // rotation 0: bottom-left to top-right
              // rotation 1: bottom-right to top-left
              // rotation 2: top-left to bottom-right
              // rotation 3: top-right to bottom-left
              const r = cell.rotation;
              if (r === 0) {
                ctx.moveTo(px, py + cs);
                ctx.lineTo(px + cs, py);
              } else if (r === 1) {
                ctx.moveTo(px + cs, py + cs);
                ctx.lineTo(px, py);
              } else if (r === 2) {
                ctx.moveTo(px, py);
                ctx.lineTo(px + cs, py + cs);
              } else {
                ctx.moveTo(px + cs, py);
                ctx.lineTo(px, py + cs);
              }
              ctx.stroke();
            }
          } else {
            ctx.fillStyle = isHovered ? '#333' : '#222';
            ctx.fillRect(px, py, cs, cs);
          }
        }
      }
    }

    function getCellFromMouse(e) {
      const canvas = document.getElementById('grid-canvas');
      const rect = canvas.getBoundingClientRect();
      const w = state.width;
      const h = state.height;
      const cellSize = Math.max(4, Math.min(30, Math.floor(600 / Math.max(w, h))));
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const cx = Math.floor(mx / cellSize);
      const cy = Math.floor(my / cellSize);
      if (cx >= 0 && cx < w && cy >= 0 && cy < h) {
        return { x: cx, y: cy };
      }
      return null;
    }

    const _canvas = document.getElementById('grid-canvas');
    const _tooltip = document.getElementById('tooltip');

    _canvas.addEventListener('mousemove', function(e) {
      const cell = getCellFromMouse(e);
      const prev = state.hoverCell;
      const changed = !prev && cell ||
                      prev && !cell ||
                      prev && cell && (prev.x !== cell.x || prev.y !== cell.y);
      state.hoverCell = cell;
      if (changed) render();

      if (cell) {
        const gridCell = state.grid[cell.y] && state.grid[cell.y][cell.x];
        const name = gridCell ? (BLOCK_TYPES[gridCell.type] ? BLOCK_TYPES[gridCell.type].name : gridCell.type) : 'Empty';
        _tooltip.textContent = name;
        _tooltip.style.display = 'block';
        _tooltip.style.left = (e.clientX + 12) + 'px';
        _tooltip.style.top = (e.clientY - 8) + 'px';
      } else {
        _tooltip.style.display = 'none';
      }
    });

    _canvas.addEventListener('mouseleave', function() {
      state.hoverCell = null;
      _tooltip.style.display = 'none';
      render();
    });

    function buildLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      for (const [, block] of Object.entries(BLOCK_TYPES)) {
        const item = document.createElement('div');
        item.className = 'legend-item';

        const swatch = document.createElement('div');
        swatch.className = 'legend-swatch';
        swatch.style.background = block.color;

        const label = document.createElement('span');
        label.textContent = block.name;

        item.appendChild(swatch);
        item.appendChild(label);
        legend.appendChild(item);
      }
    }

    buildLegend();
    recalculate();
  </script>
</body>
</html>
