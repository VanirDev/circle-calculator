<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SE Circle Calculator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      color: #cdd6f4;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 16px;
      color: #e2e8f0;
    }

    #controls {
      background: #16213e;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="number"] {
      background: #0f3460;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 1rem;
      padding: 6px 10px;
      width: 80px;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #e94560;
    }

    .toggle-group {
      display: flex;
      gap: 6px;
    }

    .toggle-btn {
      background: #0f3460;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #aaa;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 6px 14px;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      accent-color: #e94560;
      cursor: pointer;
      width: 15px;
      height: 15px;
    }

    .checkbox-label input[type="checkbox"]:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    #grid-canvas {
      border: 1px solid #334155;
      border-radius: 4px;
      cursor: crosshair;
      display: block;
      background: #0d1117;
    }

    #legend {
      background: #16213e;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    #tooltip {
      position: fixed;
      background: #16213e;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 0.8rem;
      padding: 6px 10px;
      pointer-events: none;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <h1>SE Circle Calculator</h1>

  <div id="controls">
    <div class="control-group">
      <label for="width-input">Width</label>
      <input id="width-input" type="number" min="3" max="200" value="20"
             oninput="state.width = Math.max(3, Math.min(200, +this.value)); recalculate();" />
    </div>

    <div class="control-group">
      <label for="height-input">Height</label>
      <input id="height-input" type="number" min="3" max="200" value="20"
             oninput="state.height = Math.max(3, Math.min(200, +this.value)); recalculate();" />
    </div>

    <div class="control-group">
      <label>Mode</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-internal" onclick="setMode('internal')">Internal</button>
        <button class="toggle-btn active" id="btn-external" onclick="setMode('external')">External</button>
      </div>
    </div>

    <div class="control-group">
      <label>Block Types</label>
      <div class="checkbox-group" id="block-checkboxes">
        <label class="checkbox-label">
          <input type="checkbox" value="flat" checked disabled />
          Flat
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope45" checked
                 onchange="toggleBlock('slope45', this.checked)" />
          45°
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope2" checked
                 onchange="toggleBlock('slope2', this.checked)" />
          1:2
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope3"
                 onchange="toggleBlock('slope3', this.checked)" />
          1:3
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope4"
                 onchange="toggleBlock('slope4', this.checked)" />
          1:4
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope5"
                 onchange="toggleBlock('slope5', this.checked)" />
          1:5
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope6"
                 onchange="toggleBlock('slope6', this.checked)" />
          1:6
        </label>
      </div>
    </div>
  </div>

  <canvas id="grid-canvas"></canvas>
  <div id="legend"></div>
  <div id="tooltip"></div>

  <script>
    const BLOCK_TYPES = {
      flat:    { name: 'Flat',  dx: 1, dy: 0, angle: 0,                    color: '#4a9eff' },
      slope45: { name: '45°',   dx: 1, dy: 1, angle: Math.PI / 4,          color: '#e94560' },
      slope2:  { name: '1:2',   dx: 1, dy: 2, angle: Math.atan2(1, 2),     color: '#f5a623' },
      slope3:  { name: '1:3',   dx: 1, dy: 3, angle: Math.atan2(1, 3),     color: '#7ed321' },
      slope4:  { name: '1:4',   dx: 1, dy: 4, angle: Math.atan2(1, 4),     color: '#bd10e0' },
      slope5:  { name: '1:5',   dx: 1, dy: 5, angle: Math.atan2(1, 5),     color: '#50e3c2' },
      slope6:  { name: '1:6',   dx: 1, dy: 6, angle: Math.atan2(1, 6),     color: '#ff6b6b' },
    };

    const state = {
      width: 20,
      height: 20,
      mode: 'external',
      enabledBlocks: new Set(['flat', 'slope45', 'slope2']),
      grid: [],
      hoverCell: null,
    };

    function setMode(mode) {
      state.mode = mode;
      document.getElementById('btn-internal').classList.toggle('active', mode === 'internal');
      document.getElementById('btn-external').classList.toggle('active', mode === 'external');
      recalculate();
    }

    function toggleBlock(key, enabled) {
      if (enabled) {
        state.enabledBlocks.add(key);
      } else {
        state.enabledBlocks.delete(key);
      }
      recalculate();
    }

    function getEnabledBlocks() {
      return Object.entries(BLOCK_TYPES)
        .filter(([key]) => state.enabledBlocks.has(key))
        .map(([key, block]) => ({ key, ...block }));
    }

    function recalculate() {
      computeCircle();
      render();
    }

    function getCellSize() {
      return Math.max(4, Math.min(30, Math.floor(600 / Math.max(state.width, state.height))));
    }

    function computeCircle() {
      const w = state.width;
      const h = state.height;

      // Initialize grid[y][x] = null
      const grid = [];
      for (let y = 0; y < h; y++) {
        grid[y] = new Array(w).fill(null);
      }

      if (w < 3 || h < 3) {
        state.grid = grid;
        return;
      }

      // Radii: for external mode, blocks sit outside the ellipse boundary
      // For internal mode, blocks sit inside
      const cx = w / 2;
      const cy = h / 2;
      const rx = cx; // half-width in grid units
      const ry = cy; // half-height in grid units

      const blocks = getEnabledBlocks();
      const segments = computeQuadrant(rx, ry, blocks);
      placeQuadrant(grid, segments, cx, cy, w, h, state.mode);

      state.grid = grid;
    }

    function computeQuadrant(rx, ry, blocks) {
      // Phase 1: Generate the perimeter cells by sampling the actual ellipse.
      // For each row, find the boundary column. For each column, find the boundary row.
      // Union gives us a complete, connected, symmetric outline.
      const maxX = Math.ceil(rx);
      const maxY = Math.ceil(ry);
      const cells = new Map();

      function addCell(x, y) {
        if (x >= 0 && x < maxX && y >= 0 && y < maxY) {
          cells.set(y * maxX + x, { x, y });
        }
      }

      // Row pass: for each row qy, find the rightmost boundary column
      for (let qy = 0; qy < maxY; qy++) {
        const Y = ry - qy - 0.5; // standard Y (up from center) at cell center
        if (Y < 0) continue;
        const X = rx * Math.sqrt(Math.max(0, 1 - (Y * Y) / (ry * ry)));
        addCell(Math.floor(X), qy);
      }

      // Column pass: for each column qx, find the topmost boundary row
      for (let qx = 0; qx < maxX; qx++) {
        const X = qx + 0.5; // standard X at cell center
        if (X > rx) continue;
        const Y = ry * Math.sqrt(Math.max(0, 1 - (X * X) / (rx * rx)));
        addCell(qx, Math.floor(ry - Y));
      }

      // Sort cells into a connected path (by y then x)
      const path = Array.from(cells.values()).sort((a, b) => a.y !== b.y ? a.y - b.y : a.x - b.x);

      // Phase 2: Fit blocks to the path
      return fitBlocksToPath(path, blocks);
    }

    function fitBlocksToPath(path, blocks) {
      // Build available slope patterns from enabled blocks.
      // Each pattern: { dx, dy, blockKey } — the step from one cell to the next.
      // A 1:2 slope = 2 horizontal + 1 vertical (or 1h + 2v for steep).
      // We match runs of cells to find the best fitting block.
      const segments = [];

      // Build slope ratios: for each enabled slope, record its run:rise ratio
      const slopes = [];
      for (const block of blocks) {
        if (block.key === 'flat') continue;
        const n = block.dy;
        if (n === 1) {
          slopes.push({ run: 1, rise: 1, blockKey: block.key });
        } else {
          slopes.push({ run: n, rise: 1, blockKey: block.key }); // shallow
          slopes.push({ run: 1, rise: n, blockKey: block.key }); // steep
        }
      }
      // Sort by total size descending (prefer larger blocks)
      slopes.sort((a, b) => (b.run + b.rise) - (a.run + a.rise));

      let i = 0;
      while (i < path.length) {
        let matched = false;

        // Try to match a slope block starting at this cell
        for (const slope of slopes) {
          const needed = slope.run + slope.rise - 1; // cells this slope spans in the path
          if (i + needed > path.length) continue;

          // Check if the next 'needed' cells match this slope's pattern
          // A slope with run=R, rise=S means: R cells going right, then S cells going down
          // (or interleaved for the actual staircase path)
          const startCell = path[i];
          const endIdx = i + needed - 1;
          const endCell = path[endIdx];
          const totalDx = endCell.x - startCell.x;
          const totalDy = endCell.y - startCell.y;

          if (totalDx === slope.run - 1 && totalDy === slope.rise - 1) {
            // This run of cells matches the slope's dimensions
            // Place as a single slope block
            segments.push({
              x: startCell.x,
              y: startCell.y,
              dx: slope.run,
              dy: slope.rise,
              blockKey: slope.blockKey
            });
            i += needed;
            matched = true;
            break;
          }
        }

        if (!matched) {
          // Place as flat block
          segments.push({
            x: path[i].x,
            y: path[i].y,
            dx: 1,
            dy: 1,
            blockKey: 'flat'
          });
          i++;
        }
      }

      return segments;
    }

    function getSegmentCells(seg) {
      const cells = [];
      for (let ix = 0; ix < seg.dx; ix++) {
        for (let iy = 0; iy < seg.dy; iy++) {
          cells.push({ x: seg.x + ix, y: seg.y + iy });
        }
      }
      return cells;
    }

    function mirrorPositions(qx, qy, cx, cy, w, h) {
      const results = new Map(); // key -> {gx, gy, rotation}
      const floorCx = Math.floor(cx);
      const ceilCx = Math.ceil(cx);

      // Top-right quadrant (rotation 0)
      const tr = { gx: floorCx + qx, gy: qy, rotation: 0 };
      // Top-left quadrant (rotation 1)
      const tl = { gx: ceilCx - 1 - qx, gy: qy, rotation: 1 };
      // Bottom-right quadrant (rotation 2)
      const br = { gx: floorCx + qx, gy: h - 1 - qy, rotation: 2 };
      // Bottom-left quadrant (rotation 3)
      const bl = { gx: ceilCx - 1 - qx, gy: h - 1 - qy, rotation: 3 };

      const positions = [tr, tl, br, bl];
      for (const pos of positions) {
        if (pos.gx >= 0 && pos.gx < w && pos.gy >= 0 && pos.gy < h) {
          const key = pos.gy * w + pos.gx;
          if (!results.has(key)) {
            results.set(key, pos);
          }
        }
      }

      return Array.from(results.values());
    }

    function placeQuadrant(grid, segments, cx, cy, w, h, mode) {
      // External: slope faces outward, solid fills inward (default arc position)
      // Internal: slope faces inward, solid fills outward (shift blocks outward by 1)
      const offset = mode === 'internal' ? -1 : 0;

      for (const seg of segments) {
        const cells = getSegmentCells(seg);
        for (const cell of cells) {
          // Apply offset: shift cells away from center for internal mode
          const ox = cell.x;
          const oy = cell.y + offset;
          if (oy < 0) continue;
          const mirrors = mirrorPositions(ox, oy, cx, cy, w, h);
          for (const m of mirrors) {
            if (grid[m.gy] && grid[m.gy][m.gx] === null) {
              grid[m.gy][m.gx] = { type: seg.blockKey, rotation: m.rotation };
            }
          }
        }
      }
    }

    function lightenColor(hex, amount) {
      // Parse hex to r,g,b
      const h = hex.replace('#', '');
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      // Lighten by blending toward white
      const lr = Math.min(255, Math.round(r + (255 - r) * amount));
      const lg = Math.min(255, Math.round(g + (255 - g) * amount));
      const lb = Math.min(255, Math.round(b + (255 - b) * amount));
      return `rgb(${lr}, ${lg}, ${lb})`;
    }

    function render() {
      const canvas = document.getElementById('grid-canvas');
      const ctx = canvas.getContext('2d');
      const w = state.width;
      const h = state.height;

      const cellSize = getCellSize();
      canvas.width = w * cellSize;
      canvas.height = h * cellSize;

      // Background
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw cells
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const cell = state.grid[y] && state.grid[y][x];
          const isHovered = state.hoverCell && state.hoverCell.x === x && state.hoverCell.y === y;
          const px = x * cellSize;
          const py = y * cellSize;
          const cs = cellSize - 1;

          if (cell) {
            const blockType = BLOCK_TYPES[cell.type];
            const baseColor = blockType ? blockType.color : '#666';
            ctx.fillStyle = isHovered ? lightenColor(baseColor, 0.3) : baseColor;
            ctx.fillRect(px, py, cs, cs);

            // Draw slope indicator for non-flat blocks
            if (cell.type !== 'flat' && cellSize >= 6) {
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
              ctx.lineWidth = 1;
              ctx.beginPath();
              // rotation 0: bottom-left to top-right
              // rotation 1: bottom-right to top-left
              // rotation 2: top-left to bottom-right
              // rotation 3: top-right to bottom-left
              const r = cell.rotation;
              if (r === 0) {
                ctx.moveTo(px, py + cs);
                ctx.lineTo(px + cs, py);
              } else if (r === 1) {
                ctx.moveTo(px + cs, py + cs);
                ctx.lineTo(px, py);
              } else if (r === 2) {
                ctx.moveTo(px, py);
                ctx.lineTo(px + cs, py + cs);
              } else {
                ctx.moveTo(px + cs, py);
                ctx.lineTo(px, py + cs);
              }
              ctx.stroke();
            }
          } else {
            ctx.fillStyle = isHovered ? '#333' : '#222';
            ctx.fillRect(px, py, cs, cs);
          }
        }
      }
    }

    function getCellFromMouse(e) {
      const canvas = document.getElementById('grid-canvas');
      const rect = canvas.getBoundingClientRect();
      const w = state.width;
      const h = state.height;
      const cellSize = getCellSize();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const cx = Math.floor(mx / cellSize);
      const cy = Math.floor(my / cellSize);
      if (cx >= 0 && cx < w && cy >= 0 && cy < h) {
        return { x: cx, y: cy };
      }
      return null;
    }

    const _canvas = document.getElementById('grid-canvas');
    const _tooltip = document.getElementById('tooltip');

    _canvas.addEventListener('mousemove', function(e) {
      const cell = getCellFromMouse(e);
      const prev = state.hoverCell;
      const changed = !prev && cell ||
                      prev && !cell ||
                      prev && cell && (prev.x !== cell.x || prev.y !== cell.y);
      state.hoverCell = cell;
      if (changed) render();

      if (cell) {
        const gridCell = state.grid[cell.y] && state.grid[cell.y][cell.x];
        const name = gridCell ? (BLOCK_TYPES[gridCell.type] ? BLOCK_TYPES[gridCell.type].name : gridCell.type) : 'Empty';
        _tooltip.textContent = name;
        _tooltip.style.display = 'block';
        _tooltip.style.left = (e.clientX + 12) + 'px';
        _tooltip.style.top = (e.clientY - 8) + 'px';
      } else {
        _tooltip.style.display = 'none';
      }
    });

    _canvas.addEventListener('mouseleave', function() {
      state.hoverCell = null;
      _tooltip.style.display = 'none';
      render();
    });

    function buildLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      for (const [, block] of Object.entries(BLOCK_TYPES)) {
        const item = document.createElement('div');
        item.className = 'legend-item';

        const swatch = document.createElement('div');
        swatch.className = 'legend-swatch';
        swatch.style.background = block.color;

        const label = document.createElement('span');
        label.textContent = block.name;

        item.appendChild(swatch);
        item.appendChild(label);
        legend.appendChild(item);
      }
    }

    buildLegend();
    recalculate();
  </script>
</body>
</html>
