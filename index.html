<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SE Circle Calculator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      color: #cdd6f4;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 16px;
      color: #e2e8f0;
    }

    #controls {
      background: #16213e;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="number"] {
      background: #0f3460;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 1rem;
      padding: 6px 10px;
      width: 80px;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #e94560;
    }

    .toggle-group {
      display: flex;
      gap: 6px;
    }

    .toggle-btn {
      background: #0f3460;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #aaa;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 6px 14px;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      accent-color: #e94560;
      cursor: pointer;
      width: 15px;
      height: 15px;
    }

    .checkbox-label input[type="checkbox"]:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    #grid-canvas {
      border: 1px solid #334155;
      border-radius: 4px;
      cursor: crosshair;
      display: block;
      background: #0d1117;
    }

    #legend {
      background: #16213e;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    #text-output {
      background: #0d1117;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-family: monospace;
      font-size: 0.75rem;
      line-height: 1.1;
      padding: 12px;
      margin-top: 16px;
      overflow-x: auto;
      white-space: pre;
      user-select: all;
    }

    #tooltip {
      position: fixed;
      background: #16213e;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #e2e8f0;
      font-size: 0.8rem;
      padding: 6px 10px;
      pointer-events: none;
      display: none;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <h1>SE Circle Calculator</h1>

  <div id="controls">
    <div class="control-group">
      <label for="width-input">Width</label>
      <input id="width-input" type="number" min="3" max="200" value="20"
             oninput="state.width = Math.max(3, Math.min(200, +this.value)); recalculate();" />
    </div>

    <div class="control-group">
      <label for="height-input">Height</label>
      <input id="height-input" type="number" min="3" max="200" value="20"
             oninput="state.height = Math.max(3, Math.min(200, +this.value)); recalculate();" />
    </div>

    <div class="control-group">
      <label>Mode</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-internal" onclick="setMode('internal')">Internal</button>
        <button class="toggle-btn active" id="btn-external" onclick="setMode('external')">External</button>
      </div>
    </div>

    <div class="control-group">
      <label>Block Types</label>
      <div class="checkbox-group" id="block-checkboxes">
        <label class="checkbox-label">
          <input type="checkbox" value="flat" checked disabled />
          Flat
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope45" checked
                 onchange="toggleBlock('slope45', this.checked)" />
          45°
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope2" checked
                 onchange="toggleBlock('slope2', this.checked)" />
          1:2
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope3"
                 onchange="toggleBlock('slope3', this.checked)" />
          1:3
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope4"
                 onchange="toggleBlock('slope4', this.checked)" />
          1:4
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope5"
                 onchange="toggleBlock('slope5', this.checked)" />
          1:5
        </label>
        <label class="checkbox-label">
          <input type="checkbox" value="slope6"
                 onchange="toggleBlock('slope6', this.checked)" />
          1:6
        </label>
      </div>
    </div>

    <div class="control-group">
      <label>Ordering</label>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-monotonic" onclick="setOrdering('monotonic')">Monotonic</button>
        <button class="toggle-btn" id="btn-free" onclick="setOrdering('free')">Free</button>
      </div>
    </div>
  </div>

  <canvas id="grid-canvas"></canvas>
  <div id="legend"></div>
  <pre id="text-output"></pre>
  <div id="tooltip"></div>

  <script src="circle.js"></script>
  <script>
    // Color mapping for block types (circle.js BLOCK_TYPES only has name, dx, dy)
    const BLOCK_COLORS = {
      flat:    '#4a9eff',
      slope45: '#e94560',
      slope2:  '#f5a623',
      slope3:  '#7ed321',
      slope4:  '#bd10e0',
      slope5:  '#50e3c2',
      slope6:  '#ff6b6b',
    };

    const state = {
      width: 20,
      height: 20,
      mode: 'external',
      enabledBlocks: new Set(['flat', 'slope45', 'slope2']),
      ordering: 'monotonic',
      grid: [],
      hoverCell: null,
    };

    function setMode(mode) {
      state.mode = mode;
      document.getElementById('btn-internal').classList.toggle('active', mode === 'internal');
      document.getElementById('btn-external').classList.toggle('active', mode === 'external');
      recalculate();
    }

    function setOrdering(ordering) {
      state.ordering = ordering;
      document.getElementById('btn-monotonic').classList.toggle('active', ordering === 'monotonic');
      document.getElementById('btn-free').classList.toggle('active', ordering === 'free');
      recalculate();
    }

    function toggleBlock(key, enabled) {
      if (enabled) {
        state.enabledBlocks.add(key);
      } else {
        state.enabledBlocks.delete(key);
      }
      recalculate();
    }

    function recalculate() {
      const result = computeCircle({
        width: state.width,
        height: state.height,
        mode: state.mode,
        enabledBlocks: state.enabledBlocks,
        ordering: state.ordering,
      });
      state.grid = result.grid;
      render();
    }

    function getCellSize() {
      return Math.max(4, Math.min(30, Math.floor(600 / Math.max(state.width, state.height))));
    }

    function applyRotation(p, rotation, cs) {
      switch (rotation) {
        case 0: return p;
        case 1: return { x: cs - p.x, y: p.y };
        case 2: return { x: p.x, y: cs - p.y };
        case 3: return { x: cs - p.x, y: cs - p.y };
      }
    }

    function lightenColor(hex, amount) {
      // Parse hex to r,g,b
      const h = hex.replace('#', '');
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      // Lighten by blending toward white
      const lr = Math.min(255, Math.round(r + (255 - r) * amount));
      const lg = Math.min(255, Math.round(g + (255 - g) * amount));
      const lb = Math.min(255, Math.round(b + (255 - b) * amount));
      return `rgb(${lr}, ${lg}, ${lb})`;
    }

    function render() {
      const canvas = document.getElementById('grid-canvas');
      const ctx = canvas.getContext('2d');
      const w = state.width;
      const h = state.height;
      const isInternal = state.mode === 'internal';
      const pad = isInternal ? 1 : 0;

      const cellSize = getCellSize();
      canvas.width = (w + 2 * pad) * cellSize;
      canvas.height = (h + 2 * pad) * cellSize;

      // Background
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid cells (with padding offset)
      for (let y = -pad; y < h + pad; y++) {
        for (let x = -pad; x < w + pad; x++) {
          const cell = (y >= 0 && y < h && x >= 0 && x < w) ? state.grid[y] && state.grid[y][x] : null;
          const isHovered = state.hoverCell && state.hoverCell.x === x && state.hoverCell.y === y;
          const px = (x + pad) * cellSize;
          const py = (y + pad) * cellSize;
          const cs = cellSize - 1;

          if (cell) {
            const baseColor = BLOCK_COLORS[cell.type] || '#666';
            const color = isHovered ? lightenColor(baseColor, 0.3) : baseColor;

            if (cell.type === 'flat') {
              // Flat blocks always fill the entire cell solid
              ctx.fillStyle = color;
              ctx.fillRect(px, py, cs, cs);
            } else {
              // Slope block: draw empty background, then fill the slope polygon.
              // The slope line goes from corner (0,0) to corner (cs,cs) in unrotated
              // cell-local space, then applyRotation transforms it to the correct quadrant.
              ctx.fillStyle = isHovered ? '#333' : '#222';
              ctx.fillRect(px, py, cs, cs);

              // Unrotated slope line: (0,0) to (cs,cs)
              const lp = [{ x: 0, y: 0 }, { x: cs, y: cs }];

              // Determine fill side:
              // External mode fills the outer half (below the diagonal in unrotated space).
              // Internal mode fills the inner half (above the diagonal in unrotated space).
              // In unrotated space: "above" means y < line_y, "below" means y > line_y.
              // The line is y=x, so above = y < x, below = y > x.
              const fillBelow = state.mode === 'external';

              const corners = [{ x: 0, y: 0 }, { x: cs, y: 0 }, { x: cs, y: cs }, { x: 0, y: cs }];
              const fillCorners = corners.filter(c => {
                // line is y=x in unrotated space; corners on the fill side
                if (fillBelow) return c.y > c.x + 0.01;
                else return c.y < c.x - 0.01;
              });

              // Build convex polygon from line endpoints + fill corners
              const poly = [...lp, ...fillCorners];
              const centX = poly.reduce((s, p) => s + p.x, 0) / poly.length;
              const centY = poly.reduce((s, p) => s + p.y, 0) / poly.length;
              poly.sort((a, b) => Math.atan2(a.y - centY, a.x - centX) - Math.atan2(b.y - centY, b.x - centX));

              // Apply rotation and draw fill
              const rPoly = poly.map(p => applyRotation(p, cell.rotation, cs));
              ctx.fillStyle = color;
              ctx.beginPath();
              ctx.moveTo(px + rPoly[0].x, py + rPoly[0].y);
              for (let i = 1; i < rPoly.length; i++)
                ctx.lineTo(px + rPoly[i].x, py + rPoly[i].y);
              ctx.closePath();
              ctx.fill();

              // Draw slope line
              if (cs >= 6) {
                const rl = lp.map(p => applyRotation(p, cell.rotation, cs));
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(px + rl[0].x, py + rl[0].y);
                ctx.lineTo(px + rl[1].x, py + rl[1].y);
                ctx.stroke();
              }
            }
          } else {
            ctx.fillStyle = isHovered ? '#333' : '#222';
            ctx.fillRect(px, py, cs, cs);
          }
        }
      }

      // Text output
      const CHAR_MAP = { flat: '#', slope45: '/', slope2: '/', slope3: '/', slope4: '/', slope5: '/', slope6: '/' };
      let text = '';
      for (let y = 0; y < h; y++) {
        let row = '';
        for (let x = 0; x < w; x++) {
          const cell = state.grid[y] && state.grid[y][x];
          row += cell ? (CHAR_MAP[cell.type] || '#') : '.';
        }
        text += row + '\n';
      }
      document.getElementById('text-output').textContent = text;
    }

    function getCellFromMouse(e) {
      const canvas = document.getElementById('grid-canvas');
      const rect = canvas.getBoundingClientRect();
      const w = state.width;
      const h = state.height;
      const cellSize = getCellSize();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const cx = Math.floor(mx / cellSize);
      const cy = Math.floor(my / cellSize);
      if (cx >= 0 && cx < w && cy >= 0 && cy < h) {
        return { x: cx, y: cy };
      }
      return null;
    }

    const _canvas = document.getElementById('grid-canvas');
    const _tooltip = document.getElementById('tooltip');

    _canvas.addEventListener('mousemove', function(e) {
      const cell = getCellFromMouse(e);
      const prev = state.hoverCell;
      const changed = !prev && cell ||
                      prev && !cell ||
                      prev && cell && (prev.x !== cell.x || prev.y !== cell.y);
      state.hoverCell = cell;
      if (changed) render();

      if (cell) {
        const gridCell = state.grid[cell.y] && state.grid[cell.y][cell.x];
        const name = gridCell ? (BLOCK_TYPES[gridCell.type] ? BLOCK_TYPES[gridCell.type].name : gridCell.type) : 'Empty';
        _tooltip.textContent = name;
        _tooltip.style.display = 'block';
        _tooltip.style.left = (e.clientX + 12) + 'px';
        _tooltip.style.top = (e.clientY - 8) + 'px';
      } else {
        _tooltip.style.display = 'none';
      }
    });

    _canvas.addEventListener('mouseleave', function() {
      state.hoverCell = null;
      _tooltip.style.display = 'none';
      render();
    });

    function buildLegend() {
      const legend = document.getElementById('legend');
      legend.innerHTML = '';
      for (const [key, block] of Object.entries(BLOCK_TYPES)) {
        const item = document.createElement('div');
        item.className = 'legend-item';

        const swatch = document.createElement('div');
        swatch.className = 'legend-swatch';
        swatch.style.background = BLOCK_COLORS[key] || '#666';

        const label = document.createElement('span');
        label.textContent = block.name;

        item.appendChild(swatch);
        item.appendChild(label);
        legend.appendChild(item);
      }
    }

    buildLegend();
    recalculate();
  </script>
</body>
</html>
